<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
      gap: 32px;
    }

    .card {
      width: 100%;
      max-width: 900px;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
    }
    .card img {
      width: 100%;
      display: block;
      transition: opacity .2s;
    }
    .card:hover img { opacity: .88; }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      background: rgba(0,0,0,.93);
      align-items: center;
      justify-content: center;
    }
    #lightbox.active { display: flex; }
    #lb-img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      border-radius: 6px;
    }
    .lb-nav {
      position: absolute;
      top: 50%; transform: translateY(-50%);
      background: rgba(255,255,255,.1);
      border: none; color: #fff;
      font-size: 2rem;
      width: 48px; height: 72px;
      border-radius: 6px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .lb-nav:hover { background: rgba(255,255,255,.25); }
    #lb-prev { left: 12px; }
    #lb-next { right: 12px; }
    #lb-close {
      position: absolute; top: 14px; right: 18px;
      background: none; border: none;
      color: #fff; font-size: 2rem;
      cursor: pointer; opacity: .6; line-height: 1;
    }
    #lb-close:hover { opacity: 1; }
  </style>
</head>
<body>

  <div class="card" id="Table10.png"><img src="Table10.png" alt="" loading="lazy"></div>
  <div class="card" id="Figure4.png"><img src="Figure4.png" alt="" loading="lazy"></div>
  <div class="card" id="Figure6.png"><img src="Figure6.png" alt="" loading="lazy"></div>
  <div class="card" id="Table2.png"><img src="Table2.png" alt="" loading="lazy"></div>
  <div class="card" id="Figure5.png"><img src="Figure5.png" alt="" loading="lazy"></div>
  <div class="card" id="Figure7.png"><img src="Figure7.png" alt="" loading="lazy"></div>
  <div class="card" id="Figure8.png"><img src="Figure8.png" alt="" loading="lazy"></div>

<div id="lightbox">
  <button id="lb-close">✕</button>
  <button class="lb-nav" id="lb-prev">‹</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav" id="lb-next">›</button>
</div>

<script>
  // 阻止浏览器自动跳转到锚点，保持在顶部
  if (location.hash) {
    history.scrollRestoration = 'manual';
    window.scrollTo(0, 0);
  }

  const cards = [...document.querySelectorAll('.card img')];

  // 根据 URL hash 滚动到对应图片，如 #Figure4.png
  function scrollToHash(delay = 0) {
    const id = decodeURIComponent(location.hash.slice(1));
    if (!id) return;
    const el = document.getElementById(id);
    if (!el) return;
    setTimeout(() => {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, delay);
  }
  window.addEventListener('load', () => scrollToHash(800));
  window.addEventListener('hashchange', () => scrollToHash(0));
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  let cur = 0;

  function open(i) { cur = i; lbImg.src = cards[i].src; lightbox.classList.add('active'); }
  function close() { lightbox.classList.remove('active'); }

  cards.forEach((img, i) => img.parentElement.addEventListener('click', () => open(i)));
  document.getElementById('lb-close').addEventListener('click', close);
  document.getElementById('lb-prev').addEventListener('click', () => { cur = (cur - 1 + cards.length) % cards.length; lbImg.src = cards[cur].src; });
  document.getElementById('lb-next').addEventListener('click', () => { cur = (cur + 1) % cards.length; lbImg.src = cards[cur].src; });
  lightbox.addEventListener('click', e => { if (e.target === lightbox) close(); });
  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('active')) return;
    if (e.key === 'ArrowLeft')  { cur = (cur - 1 + cards.length) % cards.length; lbImg.src = cards[cur].src; }
    if (e.key === 'ArrowRight') { cur = (cur + 1) % cards.length; lbImg.src = cards[cur].src; }
    if (e.key === 'Escape') close();
  });
</script>
</body>
</html>
